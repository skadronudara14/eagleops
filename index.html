        <h3>UTC NOW</h3>
        <p id="utc-time">Memuat...</p>

        <script>
        // Fungsi untuk memperbarui waktu UTC
        function updateUTCTime() {
            const now = new Date();
            // Format ke ISO string lalu ambil bagian waktu saja
            const utcString = now.toISOString().substring(0,19).replace('T', ' ').replace('Z', ' UTC');
            document.getElementById('utc-time').textContent = utcString;
        }

        // Jalankan pertama kali
        updateUTCTime();

        // Perbarui setiap detik
        setInterval(updateUTCTime, 1000);
        </script>
